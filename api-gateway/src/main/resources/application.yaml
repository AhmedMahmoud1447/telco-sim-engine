server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: sim-provisioning-service
          uri: lb://sim-provisioning-service
          predicates:
            - Path=/sim-provisioning-service/**
          filters:
            - AuthenticationFilter

        - id: telemetry-service
          uri: lb://telemetry-service
          predicates:
            - Path=/telemetry-service/**
          filters:
            - AuthenticationFilter

        - id: policy-quota-service
          uri: lb://policy-quota-service
          predicates:
            - Path=/policy-quota-service/**
          filters:
            - AuthenticationFilter

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth-service/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/